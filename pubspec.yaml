name: chat_app

description: "Chat App Project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2
  get_it: ^9.2.1
  fluttertoast: ^9.0.0
  flutter_bloc: ^9.1.1
  image_picker: ^1.2.1
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  flutter_numkit: ^1.0.1
  cloud_firestore: ^6.2.0
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4
  loading_animation_widget: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/

flutter_launcher_icons:
  ios: true
  android: true
  min_sdk_android: 21
  image_path: "assets/images/launcher.png"
  web:
    generate: true
    image_path: "assets/images/launcher.png"
  windows:
    generate: true
    image_path: "assets/images/launcher.png"
  macos:
    generate: true
    image_path: "assets/images/launcher.png"
